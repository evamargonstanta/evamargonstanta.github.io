<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eva Margon – Galerija</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; padding:0; height:100%; }
    body{
      font-family:'Rubik', sans-serif;
      overflow:hidden; /* desktop */
      color:#111;
      background:#fff;
    }

    /* LANGUAGE */
    .language-switch{
      position:fixed;
      bottom:20px;
      right:24px;
      font-size:14px;
      z-index:60;
    }
    .language-switch a{
      text-decoration:none;
      color:#222;
      opacity:.6;
      transition: opacity .2s ease;
    }
    .language-switch a:hover{ opacity:1; }

    /* HERO */
    .hero{
      width:100%;
      text-align:center;
      padding-top:20px;
      position:relative;
      z-index:1;
    }

.signature{
  height:45px;
  width:auto;
  display:block;
  margin:10px auto 0;   /* ↑ poveča prostor zgoraj */
  opacity:.95;
  filter:none;
  position:relative;
  z-index:100;
}
    

    /* SCENE */
    .scene{
      position:relative;
      width:100%;
      height: calc(100vh - 100px);
      z-index:1;
    }

    /* DESKTOP: fill scene */
    .media-wrap{
      position:relative;
      width:100%;
      height:100%;
    }

    .stage{
      position:absolute;
      inset:0;
    }

    .media-wrap picture{
      position:absolute;
      inset:0;
      display:block;
      width:100%;
      height:100%;
      z-index:0;
    }

    .media-wrap img{
      width:100%;
      height:100%;
      object-fit:contain;          /* desktop */
      object-position:50% 50%;
      display:block;
      margin:0 auto;
    }

    /* SVG layers */
    #hotspots-desktop,
    #hotspots-mobile{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:2;
      pointer-events:auto;
      touch-action: manipulation;
    }

    /* default: desktop svg */
    #hotspots-desktop{ display:block; }
    #hotspots-mobile{ display:none; }

    /* mobile: show mobile svg */
    @media (max-width: 420px), (orientation: portrait) and (max-width: 768px){
      #hotspots-desktop{ display:none; }
      #hotspots-mobile{ display:block; }
    }

    /* CLICK SHAPE */
    #hotspots-desktop .click,
    #hotspots-mobile .click{
      cursor:pointer;
      fill:#fff;
      fill-opacity:0;
      stroke:none;
      pointer-events:all;
      transition: fill-opacity 160ms ease;
    }

    /* zaporedno prižiganje */

body.show-hotspots #hotspot-newspaper-d .click,
body.show-hotspots #hotspot-newspaper .click{
  animation-delay:0s;
}

body.show-hotspots #hotspot-brushes-d .click,
body.show-hotspots #hotspot-brushes .click{
  animation-delay:.15s;
}

body.show-hotspots #hotspot-crayons-d .click,
body.show-hotspots #hotspot-crayons .click{
  animation-delay:.30s;
}

body.show-hotspots #hotspot-books-d .click,
body.show-hotspots #hotspot-books .click{
  animation-delay:.45s;
}

body.show-hotspots #hotspot-screen-d .click,
body.show-hotspots #hotspot-screen .click{
  animation-delay:.60s;
}

body.show-hotspots #hotspot-press-d .click,
body.show-hotspots #hotspot-press .click{
  animation-delay:.75s;
}

body.show-hotspots #hotspot-contact-d .click,
body.show-hotspots #hotspot-contact .click{
  animation-delay:.90s;
}

body.show-hotspots #hotspot-bag-d .click,
body.show-hotspots #hotspot-bag .click{
  animation-delay:1.05s;
}

    /* ===== Hotspot hint ===== */

/* ===== Hotspot animation ===== */

@keyframes hotspotHint{

  0%{
    stroke-dashoffset:1000;
    stroke-opacity:0;
    stroke-width:2;
  }

  35%{
    stroke-dashoffset:0;
    stroke-opacity:1;
    stroke-width:2.5;
  }

  70%{
    stroke-dashoffset:0;
    stroke-opacity:.9;
    stroke-width:2.5;
  }

  100%{
    stroke-dashoffset:0;
    stroke-opacity:.45;
    stroke-width:2;
  }

}

body.show-hotspots #hotspots-desktop .click,
body.show-hotspots #hotspots-mobile .click{

  fill:#fff;
  fill-opacity:0;

  stroke:#fff;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;

  vector-effect:non-scaling-stroke;

  stroke-dasharray:1000;
  stroke-dashoffset:1000;

  animation:hotspotHint 1.8s ease forwards;
}

    /* zaporedno prižiganje */

body.show-hotspots #hotspot-newspaper-d .click,
body.show-hotspots #hotspot-newspaper .click{
  animation-delay:0s;
}

body.show-hotspots #hotspot-brushes-d .click,
body.show-hotspots #hotspot-brushes .click{
  animation-delay:.15s;
}

body.show-hotspots #hotspot-crayons-d .click,
body.show-hotspots #hotspot-crayons .click{
  animation-delay:.30s;
}

body.show-hotspots #hotspot-books-d .click,
body.show-hotspots #hotspot-books .click{
  animation-delay:.45s;
}

body.show-hotspots #hotspot-screen-d .click,
body.show-hotspots #hotspot-screen .click{
  animation-delay:.60s;
}

body.show-hotspots #hotspot-press-d .click,
body.show-hotspots #hotspot-press .click{
  animation-delay:.75s;
}

body.show-hotspots #hotspot-contact-d .click,
body.show-hotspots #hotspot-contact .click{
  animation-delay:.90s;
}

body.show-hotspots #hotspot-bag-d .click,
body.show-hotspots #hotspot-bag .click{
  animation-delay:1.05s;
}
    
    /*do tuki*/

    

    @media (hover:hover){
      #hotspots-desktop .hotspot:hover .click,
      #hotspots-mobile .hotspot:hover .click{
        fill-opacity:0.28;
      }
    }

    #hotspots-desktop .hotspot.is-tapped .click,
    #hotspots-mobile .hotspot.is-tapped .click{
      fill-opacity:0.32;
    }

    #hotspots-desktop .hotspot,
    #hotspots-mobile .hotspot{
      -webkit-tap-highlight-color:transparent;
    }

    /* CTA default: skrito na desktop */
    .mobile-cta{
      display:none;
      width:100%;
      margin:0;
      padding:0;
      text-align:center;
      position:relative;
      z-index:5000;
      line-height:1;
    }
    .mobile-cta, .mobile-cta *{ pointer-events:auto; }

    .mobile-cta button{
      appearance:none;
      border:none;
      background:transparent;
      color:#222;
      font-family:'Rubik', sans-serif;
      font-size:15px;
      font-weight:500;
      padding:8px 12px;
      margin:0;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      opacity:1;
      transition: transform .2s ease, opacity .2s ease;
      line-height:1;
      touch-action: manipulation;
    }

    .hint-row{
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .hint-arrow{
      width:26px;
      height:auto;
      display:block;
    }

    .hint-text{
      white-space:nowrap;
      opacity:1;
      font-size:13px;
    }

    /* layering */
    .scene{ position: relative; z-index: 1; }
    #hotspots-desktop, #hotspots-mobile{ z-index: 2; }

    /* Mobile menu (mreža + spacing) */
    .mobile-menu{
      display:none;
      padding:14px 12px 18px;
      background:#fff;
      position:relative;
      z-index:999;
      opacity:0;
      transform: translateY(10px);
      transition: opacity .2s ease, transform .2s ease;
      margin-top:-12px;     /* meni višje */
      margin-bottom:18px;
    }

    .mobile-menu.is-open{
      display:block;
      opacity:1;
      transform: translateY(0);
    }

    .icon-nav-mobile{
      display:grid;
      grid-template-columns: repeat(4, 64px);
      gap:14px 10px;
      justify-content:center;
    }

    .icon-nav-mobile .icon-link:nth-child(6){ grid-column:2; }
    .icon-nav-mobile .icon-link:nth-child(7){ grid-column:3; }
    .icon-nav-mobile .icon-link:nth-child(8){ grid-column:4; }

    .icon-nav-mobile .icon-link{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-decoration:none;
      min-width:0;
    }

    .icon-nav-mobile .icon{
      width:36px;
      height:36px;
      display:block;
      opacity:1;
    }

    .icon-nav-mobile .icon-title{
      margin-top:7px;
      font-size:13px;
      line-height:1.15;
      text-align:center;
      color:#111;
      opacity:.9;
      max-width:90px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .icon-nav-mobile .wide-label .icon-title{
      white-space:normal;
      max-width:110px;
      line-height:1.15;
      text-wrap:balance;
    }

    /* ---------------- MOBILE: center + crop samo levo/desno + CTA vidna ---------------- */
    @media (max-width: 420px), (orientation: portrait) and (max-width: 768px){
      html, body{ overflow-x:hidden; overflow-y:auto; }
      body{ overflow: visible; }

      :root{ --zoomX: 1.16; } /* zoom */

      .hero{
        transform:none !important;
        margin-top:-10px;
        padding-bottom:8px;
        gap:4px;

        min-height:100svh;
        display:flex;
        flex-direction:column;
        justify-content:center;   /* center all vertically */
        align-items:center;
      }

      body.menu-open .hero{
        justify-content:flex-start;
      }

      body.menu-open .mobile-cta{
        opacity:0;
        pointer-events:none;
        display:none !important;
      }

      .signature{
        height:22px;
        width:auto !important;
         margin:0 auto -18px; /* podpis bližje ilustraciji */
}

      .scene{
        height:auto;
        margin-top:-6px;
        margin-bottom:0;
        padding:0;
        line-height:0;
        width:100%;
      }

      .media-wrap{
        height: clamp(340px, 56svh, 520px);
        width:100%;
        position:relative;
        overflow:hidden; /* crop samo levo/desno */
      }

      .stage{
        position:absolute;
        inset:0;
        z-index:0;
        transform: scaleX(var(--zoomX));
        transform-origin: 50% 50%;
      }

      .media-wrap picture{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        z-index:0;
        display:block;
      }

      .media-wrap img{
        width:100%;
        height:100%;
        object-fit:contain;          /* nič ne odreže zgoraj/spodaj */
        object-position:50% 50%;
        display:block;
        margin:0 auto;
      }

      #hotspots-mobile{
        position:absolute;
        inset:0;
        width:100%;
        height:100%;
        z-index:2;
        pointer-events:auto;
      }

      .mobile-cta{
        display:block !important;
        margin-top:-14px;  /* CTA bližje ilustraciji */
        padding:0;
        line-height:1;
      }
      .mobile-cta button{
        padding:6px 10px;
      }

      .language-switch{
        bottom:16px;
        right:16px;
        font-size:13px;
      }

      .icon-nav-mobile{ gap:8px 12px; }
      .icon-nav-mobile .icon{ width:34px; height:34px; }
      .icon-nav-mobile .icon-title{ font-size:12px; max-width:86px; }
    }

    /* ===== DESKTOP HEADER ===== */
.desktop-header{
  display:none;
}

@media (min-width:769px){

  .desktop-header{
    display:flex;
    position:fixed;
    top:20px;
    left:24px;
    right:24px;
    justify-content:space-between;
    align-items:flex-start;
    z-index:5000;
  }

  .desktop-logo{
    height:42px;
    width:auto;
  }

  .desktop-menu-btn{
    background:none;
    border:0;
    padding:0;
    cursor:pointer;
  }

  .desktop-menu-btn img{
    width:34px;
    height:34px;
    display:block;
  }

  .signature{
    visibility:hidden;
  }

  /* DESKTOP MENU */
#mobileMenu{
  display:none;
  position:absolute;
  left:50%;
  top:calc(100vh - 180px);
  transform:translateX(-50%);
  width:auto;
  margin:0;
  padding:0;
  background:transparent;
  z-index:4500;
}

#mobileMenu.is-open{
  display:block;
}

/* ena vrstica ikon */
#mobileMenu .icon-nav-mobile{
  display:flex;
  flex-wrap:nowrap;
  justify-content:center;
  align-items:flex-start;
  gap:28px;
}

/* izklopi mobilno mrežo */
#mobileMenu .icon-link:nth-child(6),
#mobileMenu .icon-link:nth-child(7),
#mobileMenu .icon-link:nth-child(8){
  grid-column:auto;
}

/* večje ikone */
#mobileMenu .icon{
  width:52px;
  height:52px;
}

/* večji napisi */
#mobileMenu .icon-title{
  font-size:15px;
  max-width:110px;
  white-space:normal;
  text-align:center;
  line-height:1.2;
}
}

    .desktop-menu{
  display:none;
  width:100%;
  margin:30px auto 0;
}

.desktop-menu.is-open{
  display:block;
}

.icon-nav-desktop{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  gap:34px;
}

.icon-nav-desktop .icon-link{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
}

.icon-nav-desktop .icon{
  width:54px;
  height:54px;
}

.icon-nav-desktop .icon-title{
  margin-top:10px;
  font-size:14px;
  color:#111;
}
    
  </style>
</head>

  <script>
  /* MENU TOGGLE — mobile menu */
  (function () {
    const btn = document.getElementById('openMenuBtn');
    const menu = document.getElementById('mobileMenu');
    if (!btn || !menu) return;

    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const open = menu.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      document.body.classList.toggle('menu-open', open);
    }, { passive: false });

    menu.addEventListener('click', (e) => {
      const a = e.target.closest && e.target.closest('a');
      if(!a) return;
      menu.classList.remove('is-open');
      btn.setAttribute('aria-expanded','false');
      document.body.classList.remove('menu-open');
    });
  })();
  </script>

  <script>
  /* HOTSPOT NAV + TAP FADE (desktop + mobile) */
  (function () {
    const links = {
      // mobile ids
      'hotspot-newspaper': 'about.html',
      'hotspot-brushes': 'wet-techniques.html',
      'hotspot-crayons': 'dry-techniques.html',
      'hotspot-books': 'books.html',
      'hotspot-press': 'printmaking.html',
      'hotspot-screen': 'animation.html',
      'hotspot-contact': 'contact.html',
      'hotspot-bag': 'https://evamargon.sumupstore.com',

      // desktop ids (-d)
      'hotspot-newspaper-d': 'about.html',
      'hotspot-brushes-d': 'wet-techniques.html',
      'hotspot-crayons-d': 'dry-techniques.html',
      'hotspot-books-d': 'books.html',
      'hotspot-press-d': 'printmaking.html',
      'hotspot-screen-d': 'animation.html',
      'hotspot-contact-d': 'contact.html',
      'hotspot-bag-d': 'https://evamargon.sumupstore.com'
    };

    const isMobileOrPortrait = () =>
      window.matchMedia('(max-width: 420px)').matches ||
      window.matchMedia('(orientation: portrait) and (max-width: 768px)').matches;

    function closestHotspot(node) {
      let el = node;
      while (el && el !== document && el !== window) {
        if (el.classList && el.classList.contains('hotspot')) return el;
        el = el.parentNode;
      }
      return null;
    }

    function bindHotspots(svgEl) {
      if (!svgEl) return;

      const clearTapped = () => {
        svgEl.querySelectorAll('.hotspot.is-tapped')
          .forEach(el => el.classList.remove('is-tapped'));
      };

      svgEl.addEventListener('click', function (e) {
        const hotspot = closestHotspot(e.target);
        if (!hotspot) return;

        const href = links[hotspot.id];
        if (!href) return;

        const isExternal = /^https?:\/\//i.test(href);

        if (isMobileOrPortrait()) {
          e.preventDefault();
          clearTapped();
          hotspot.classList.add('is-tapped');
          window.setTimeout(() => {
            hotspot.classList.remove('is-tapped');
            window.location.href = href;
          }, 260);
          return;
        }

        if (isExternal) window.open(href, '_blank', 'noopener');
        else window.location.href = href;
      }, { passive:false });

      window.addEventListener('scroll', clearTapped, { passive:true });
      window.addEventListener('resize', clearTapped, { passive:true });
    }

    bindHotspots(document.getElementById('hotspots-desktop'));
    bindHotspots(document.getElementById('hotspots-mobile'));
  })();
  </script>

  <script>
(function () {

  const desktopBtn = document.getElementById("desktopMenuBtn");
  const mobileBtn  = document.getElementById("openMenuBtn");

  if (!desktopBtn || !menu) return;

  desktopBtn.addEventListener("click", function (e) {

    const open = document.body.classList.toggle("show-hotspots");

    if (mobileBtn) {
      mobileBtn.setAttribute(
        "aria-expanded",
        open ? "true" : "false"
      );
    }
  });

})();
</script>
