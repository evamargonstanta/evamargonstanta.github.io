  <style>
    /* ===== FILTER BAR ===== */
    .filter-bar{
      display:flex;
      align-items:center;
      gap:10px;
      padding: 14px 24px 0;
      max-width: 1600px;
      margin: 0 auto;
      box-sizing: border-box;
      flex-wrap: wrap;
    }
    .filter-btn{
      border:1px solid #ddd;
      background:#fff;
      color:#222;
      font-family: inherit;
      font-size: .98rem;
      font-weight: 600;
      padding: 9px 14px;
      cursor:pointer;
      border-radius: 999px;
      line-height:1;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
      transition: transform .06s ease, border-color .15s ease, box-shadow .15s ease;
    }
    @media (hover:hover){
      .filter-btn:hover{
        border-color:#bbb;
        box-shadow: 0 2px 0 rgba(0,0,0,0.06);
        transform: translateY(-1px);
      }
    }
    .filter-btn:active{ transform: translateY(0); }
    .filter-btn.is-active{
      border-color:#222;
      box-shadow: 0 2px 0 rgba(0,0,0,0.10);
    }
    @media (max-width: 900px){
      .filter-bar{ padding: 12px 20px 0; gap:8px; }
      .filter-btn{ font-size: .95rem; padding: 8px 12px; }
    }

    /* clickable cards */
    .project-card{ cursor: pointer; }

    /* play overlay – ANIMATION only */
    .project-card.is-animation::after{
      content:"";
      position:absolute;
      inset:0;
      background: url("../assets/images/icon-play.png") center center no-repeat;
      background-size: 72px 72px;
      opacity: 0.85;
      pointer-events:none;
      transition: transform .18s ease, opacity .18s ease;
    }
    @media (max-width: 900px){
      .project-card.is-animation::after{ background-size: 56px 56px; }
    }
    @media (hover:hover){
      .project-card.is-animation:hover::after{
        opacity:1;
        transform: scale(1.05);
      }
    }

    /* ===== MODAL ===== */
    .modal{ position:fixed; inset:0; display:none; z-index:999; }
    .modal.is-open{ display:block; }
    .modal-backdrop{ position:absolute; inset:0; background:rgba(0,0,0,.45); }

    .modal-panel{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width: min(1280px, calc(100vw - 48px));
      max-height: calc(100vh - 36px);
      background:#fff;
      overflow:hidden;
    }

    .modal-controls{
      position:absolute; right:16px; bottom:16px;
      z-index:5; display:flex; align-items:center; gap:14px;
    }
    .modal-controls button{
      border:0; background:transparent; padding:6px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .modal-controls svg{ width:36px; height:36px; display:block; }
    @media (max-width:520px){
      .modal-controls{ right:10px; bottom:10px; gap:12px; }
      .modal-controls svg{ width:32px; height:32px; }
    }

    .modal-content{
      display:flex;
      align-items: stretch;
    }

    .modal-media{
      flex: 0 0 58%;
      padding: 26px;
      box-sizing: border-box;
      background:#fff;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .media-grid{
      width:100%;
      height:auto;
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      column-gap: 20px;
      row-gap: 20px;
      align-content:start;
    }

    .media-tile{
      width:100%;
      aspect-ratio: 1 / 1;
      background:#f6f6f6;
      overflow:hidden;
      display:block;
    }

    .media-tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    .media-tile.is-hidden{ display:none; }

    .media-grid.count-3{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
    }
    .media-grid.count-3 .media-tile:nth-child(3){
      grid-column: 1 / -1;
      width: 100%;
      justify-self: stretch;
      aspect-ratio: 2 / 1;
    }

    .media-grid.count-2{
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto;
      justify-content: center;
    }
    .media-grid.count-2 .media-tile{
      width: calc(50% - 10px);
    }

    .media-grid.count-1{
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      justify-content: center;
    }
    .media-grid.count-1 .media-tile{
      width: calc(50% - 10px);
    }

    .modal-body{
      flex: 0 0 42%;
      padding: 26px;
      box-sizing: border-box;
      background:#fff;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .meta-wrap{
      width: 360px;
      max-width: 100%;
      text-align:left;
    }

    .meta-genre{
      font-size: 1rem;
      font-style: italic;
      opacity:.65;
      margin: 0 0 18px;
      letter-spacing:.01em;
    }

    .meta-title{
      font-size: 1.32rem;
      font-weight:600;
      margin: 0 0 18px;
    }

    .meta{
      display:grid;
      grid-template-columns: 120px 1fr;
      column-gap:12px;
      row-gap:10px;
      font-size:.98rem;
      line-height:1.25;
      align-items:start;
      text-align:left;
    }
    .meta .label{ opacity:.65; }
    .meta .value{ opacity:.95; }

    .desc{
      margin: 0 0 22px 0;
      font-size:1rem;
      line-height:1.5;
      opacity:.95;
      text-align: justify;
      hyphens: auto;
      display:-webkit-box;
      -webkit-line-clamp: 9;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }

    /* ✅ MOBILE: fullscreen modal + fixed controls */
    @media (max-width: 900px){
      .modal-panel{
        position: fixed;
        left: 0;
        top: 0;
        transform: none;
        width: 100vw;
        height: 100vh;
        max-height: none;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      .modal-content{
        flex-direction: column;
        align-items: stretch;
      }

      .modal-media{
        padding: 22px;
        flex: 0 0 auto;
      }

      .modal-body{
        flex: 0 0 auto;
        overflow: visible;
        padding: 12px 14px 120px;
        align-items:flex-start;
        justify-content:flex-start;
      }

      .desc{
        -webkit-line-clamp: unset;
        overflow: visible;
      }

      .meta{ grid-template-columns: 1fr; row-gap: 4px; }
      .meta .label{ margin-top: 10px; }

      .modal-controls{
        position: fixed;
        right: calc(12px + env(safe-area-inset-right, 0px));
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        z-index: 2000;
      }
    }

    .project-card.is-hidden{ display:none; }
  </style>

      const mRole = document.getElementById('mRole');
      const mAuthors = document.getElementById('mAuthors');
      const mMusic = document.getElementById('mMusic');
      const mProduction = document.getElementById('mProduction');
      const mNotes = document.getElementById('mNotes');

      const lblDuration = document.getElementById('lblDuration');
      const lblClient = document.getElementById('lblClient');
      const lblText = document.getElementById('lblText');
      const lblRole = document.getElementById('lblRole');
      const lblAuthors = document.getElementById('lblAuthors');
      const lblMusic = document.getElementById('lblMusic');
      const lblProduction = document.getElementById('lblProduction');

      const mediaGrid = document.getElementById('mediaGrid');
      const mediaImgs = [
        document.getElementById('mediaImg1'),
        document.getElementById('mediaImg2'),
        document.getElementById('mediaImg3'),
        document.getElementById('mediaImg4'),
      ];

      const cards = Array.from(document.querySelectorAll('.project-card'));
      let currentIndex = -1;

      function prettyGenre(cat){
        if (cat === 'animation') return 'Animation';
        if (cat === 'design') return 'Design';
        return '—';
      }

      function show(el, yes){
        if (!el) return;
        el.style.display = yes ? '' : 'none';
      }

      function buildImagesFromFolder(folder){
        if (!folder) return [];
        const base = PROJECTS_BASE + folder + '/';
        return [
          base + folder + '-01.jpg',
          base + folder + '-02.jpg',
          base + folder + '-03.jpg',
          base + folder + '-04.jpg',
        ];
      }

      function fillMediaGridFromFolder(folder, title){
        const imgs = buildImagesFromFolder(folder);

        mediaGrid.classList.remove('count-1','count-2','count-3','count-4');

        for (let i = 0; i < 4; i++){
          const imgEl = mediaImgs[i];
          const tile = imgEl.closest('.media-tile');

          imgEl.onerror = null;

          imgEl.src = imgs[i] || '';
          imgEl.alt = imgs[i] ? (title || '') : '';

          tile.classList.remove('is-hidden');

          if (!imgs[i]) {
            imgEl.removeAttribute('src');
            imgEl.alt = '';
            tile.classList.add('is-hidden');
            continue;
          }

          imgEl.onerror = () => {
            imgEl.removeAttribute('src');
            imgEl.alt = '';
            tile.classList.add('is-hidden');
            updateGridClass();
          };
        }

        setTimeout(updateGridClass, 0);

        function updateGridClass(){
          let visibleCount = 0;
          for (let i = 0; i < 4; i++){
            const tile = mediaImgs[i].closest('.media-tile');
            if (!tile.classList.contains('is-hidden')) visibleCount++;
          }
          const safeCount = Math.max(1, Math.min(4, visibleCount));
          mediaGrid.classList.remove('count-1','count-2','count-3','count-4');
          mediaGrid.classList.add('count-' + safeCount);
        }
      }

      function fillModalFromCard(card){
        const title = card.getAttribute('data-title') || '—';
        const year = card.getAttribute('data-year') || '—';
        const duration = card.getAttribute('data-duration') || '';
        const client = card.getAttribute('data-client') || '';
        const text = card.getAttribute('data-text') || '';
        const role = card.getAttribute('data-role') || '';
        const authors = card.getAttribute('data-authors') || '';
        const production = card.getAttribute('data-production') || '';
        const music = card.getAttribute('data-music') || '';
        const notes = card.getAttribute('data-notes') || '';
        const category = card.getAttribute('data-category') || '';
        const folder = card.getAttribute('data-folder') || '';

        mGenre.textContent = prettyGenre(category);
        mTitleTop.textContent = title;
        mYear.textContent = year;
        mNotes.textContent = notes;

        fillMediaGridFromFolder(folder, title);

        const isAnimation = category === 'animation';
        const isDesign = category === 'design';

        /* Duration: animation only */
        show(lblDuration, isAnimation);
        show(mDuration, isAnimation);
        mDuration.textContent = isAnimation ? (duration || '—') : '';

        /* Client: show wherever present (design + animation) */
        const showClientRow = client.trim().length > 0;
        show(lblClient, showClientRow);
        show(mClient, showClientRow);
        mClient.textContent = showClientRow ? client : '';

        /* Text: only if present (design) */
        const showTextRow = isDesign && text.trim().length > 0;
        show(lblText, showTextRow);
        show(mText, showTextRow);
        mText.textContent = showTextRow ? text : '';

        /* Role: both */
        show(lblRole, true);
        show(mRole, true);
        mRole.textContent = role.trim().length > 0 ? role : '—';

        /* Authors: only if present */
        const showAuthorsRow = authors.trim().length > 0;
        show(lblAuthors, showAuthorsRow);
        show(mAuthors, showAuthorsRow);
        mAuthors.textContent = showAuthorsRow ? authors : '';

        /* Music: only if present (animation) */
        const showMusicRow = isAnimation && music.trim().length > 0;
        show(lblMusic, showMusicRow);
        show(mMusic, showMusicRow);
        mMusic.textContent = showMusicRow ? music : '';

        /* Production: only if present (animation) */
        const showProductionRow = isAnimation && production.trim().length > 0;
        show(lblProduction, showProductionRow);
        show(mProduction, showProductionRow);
        mProduction.textContent = showProductionRow ? production : '';
      }

      function openModal(index){
        currentIndex = index;
        fillModalFromCard(cards[currentIndex]);
        modal.classList.add('is-open');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeModal(){
        modal.classList.remove('is-open');
        modal.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        currentIndex = -1;
      }

      function showPrev(){
        if (currentIndex < 0) return;
        currentIndex = (currentIndex - 1 + cards.length) % cards.length;
        fillModalFromCard(cards[currentIndex]);
      }

      function showNext(){
        if (currentIndex < 0) return;
        currentIndex = (currentIndex + 1) % cards.length;
        fillModalFromCard(cards[currentIndex]);
      }

      cards.forEach((card, idx) => {
        card.addEventListener('click', () => openModal(idx));
        card.setAttribute('tabindex', '0');
        card.setAttribute('role', 'button');
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(idx);
          }
        });
      });

      closeBtn.addEventListener('click', closeModal);
      backdrop.addEventListener('click', closeModal);

      prevBtn.addEventListener('click', showPrev);
      nextBtn.addEventListener('click', showNext);

      window.addEventListener('keydown', (e) => {
        if (!modal.classList.contains('is-open')) return;
        if (e.key === 'Escape') closeModal();
        if (e.key === 'ArrowLeft') showPrev();
        if (e.key === 'ArrowRight') showNext();
      });

      /* FILTERS */
      const filterBtns = Array.from(document.querySelectorAll('.filter-btn'));

      function applyFilter(filter){
        filterBtns.forEach(btn => {
          const isActive = btn.getAttribute('data-filter') === filter;
          btn.classList.toggle('is-active', isActive);
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });

        cards.forEach(card => {
          const cat = card.getAttribute('data-category');
          const shouldShow = (filter === 'all') || (cat === filter);
          card.classList.toggle('is-hidden', !shouldShow);
        });

        if (modal.classList.contains('is-open')) {
          const currentCard = cards[currentIndex];
          if (currentCard && currentCard.classList.contains('is-hidden')) {
            closeModal();
          }
        }
      }

      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          applyFilter(btn.getAttribute('data-filter'));
        });
      });
    })();
  </script>
</body>
</html>
